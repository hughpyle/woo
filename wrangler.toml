name = "woo"
main = "src/worker/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1.0

[vars]
# Cloudflare deploys start as a clean core world by default. To auto-install
# bundled local catalogs at bootstrap, set a comma-separated list here before
# first deploy, for example: "chat,dubspace,pinboard,taskspace".
WOO_AUTO_INSTALL_CATALOGS = ""

# Static assets: the bundled SPA is built to dist/ via `npm run build`.
# The Worker entry routes global API/WS traffic to the gateway DO and object
# REST routes through Directory; everything else falls through to ASSETS.fetch.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[durable_objects.bindings]]
name = "WOO"
class_name = "PersistentObjectDO"

[[durable_objects.bindings]]
name = "DIRECTORY"
class_name = "DirectoryDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PersistentObjectDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["DirectoryDO"]
